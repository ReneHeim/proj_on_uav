name: Python CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install system geospatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov ruff
          python -m pip install -e .

      - name: Ruff syntax and import sanity checks
        run: |
          python -m ruff check src scripts tests --select E9,F63,F7,F82

      - name: Compile project Python files
        run: |
          python -m compileall -q src scripts tests

      - name: Run unit tests
        env:
          MPLBACKEND: Agg
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests -q --tb=short --durations=20

  preprocessing-smoke:
    name: RedEdge-P preprocessing smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff requests imageio pyexiftool pyzbar opencv-python-headless scikit-image
          python -m pip install --no-deps "micasense @ git+https://github.com/micasense/imageprocessing.git"
          python -m pip install -e .

      - name: Import preprocessing entry points
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/matplotlib
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
          from pathlib import Path

          import numpy as np

          import scripts.preprocessing.rededgep.micasense_rededgep_preprocess as pre
          import scripts.preprocessing.rededgep.run_2025_rededgep_preprocess as runner

          assert pre.BAND_SUFFIXES == ("1", "2", "3", "4", "5", "6")
          assert pre.RAW_MS_BAND_NAMES == ("Blue", "Green", "Red", "NIR", "Red edge")
          assert pre.PANCHRO_BAND_NAME == "Panchro"
          assert pre.output_indexes_and_names(False) == (
              (0, 1, 2, 4, 3),
              ("Blue", "Green", "Red", "Red edge", "NIR"),
          )
          assert pre.capture_files_from_blue(Path("IMG_0001_1.tif"))[-1] == "IMG_0001_6.tif"
          assert pre.scale_reflectance_to_uint16(np.array([-1.0, 1.0, 3.0])).tolist() == [
              0,
              32767,
              65534,
          ]
          assert runner.DEFAULT_OUTPUT_NAME
          PY
