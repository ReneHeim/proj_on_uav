name: Auto-format

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: code-style-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-style:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .pre-commit-config.yaml

      - name: Check formatting and static style
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit==3.5.0
          pre-commit run --all-files
